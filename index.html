<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1 and Done – Shot Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Backgrounds */
            --bg-base: #0f1923;
            --bg-surface: #162029;
            --bg-elevated: #1a2836;
            --bg-sunken: #0c1219;
            --bg-court: #15222f;

            /* Borders */
            --border-subtle: #1e3045;
            --border-medium: #2a3f55;
            --border-strong: #3a5570;

            /* Text */
            --text-primary: #f0f4f8;
            --text-secondary: #8fa3b8;
            --text-muted: #5a7a94;
            --text-faint: #3a5570;

            /* Accent */
            --accent: #00b4d8;
            --accent-hover: #00cfef;
            --accent-subtle: rgba(0, 180, 216, 0.12);
            --accent-on: #0f1923;

            /* Semantic */
            --color-make: #34d399;
            --color-make-bg: rgba(52, 211, 153, 0.10);
            --color-miss: #f87171;
            --color-miss-bg: rgba(248, 113, 113, 0.08);
            --color-fg-pct: #fbbf24;
            --color-danger: #f87171;
            --color-ft-make: #60a5fa;
            --color-ft-miss: #a78bfa;

            /* Spacing (4px grid) */
            --sp-1: 4px;
            --sp-2: 8px;
            --sp-3: 12px;
            --sp-4: 16px;
            --sp-5: 20px;
            --sp-6: 24px;

            /* Radius */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            --radius-full: 99px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        /* ── COURT ── */
        .court-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: var(--sp-2);
            position: relative;
            overflow: hidden;
        }

        .court-wrapper {
            position: relative;
            width: 100%;
            max-width: 860px;
            aspect-ratio: 940 / 500;
            max-height: 100%;
        }

        svg.court {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        .court-floor { fill: var(--bg-court); }
        .court-basket { stroke: var(--accent); stroke-width: 3; fill: var(--accent-subtle); }

        #heatCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: .8;
            display: none;
        }

        #markersLayer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* ── SHOT MARKERS ── */
        .sm {
            position: absolute;
            width: 10px;
            height: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4px;
            font-weight: 900;
            transform: translate(-50%, -50%);
            color: white;
            border: 1.5px solid;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .7);
            cursor: default;
            transition: transform .12s, opacity .2s;
            user-select: none;
            border-radius: 50%;
        }

        .sm:hover {
            transform: translate(-50%, -50%) scale(1.35);
            z-index: 20;
        }

        .sm.dimmed {
            opacity: .18;
        }

        .sm-circle,
        .sm-square,
        .sm-diamond {
            border-radius: 50%;
        }

        .sm-diamond .lbl {
            display: block;
        }

        .sm-triangle {
            width: 0;
            height: 0;
            background: transparent !important;
            box-shadow: none;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom-width: 26px;
            border-bottom-style: solid;
            border-top: none;
            border-radius: 0;
            display: flex;
            align-items: flex-end;
            padding-bottom: 2px;
        }

        /* make = solid green, miss = dashed red */
        .sm-make {
            border-color: var(--color-make);
            border-style: solid;
            background: var(--color-make-bg);
        }

        .sm-miss {
            border-color: var(--color-miss);
            border-style: dashed;
            background: var(--color-miss-bg);
        }

        .sm-triangle.sm-make {
            border-bottom-color: var(--color-make);
        }

        .sm-triangle.sm-miss {
            border-bottom-color: var(--color-miss);
        }

        /* ── SPLIT STATS PANELS ── */
        .side-panel {
            width: 160px;
            position: absolute;
            top: 0;
            bottom: 0;
            background: var(--bg-surface);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 20;
            box-shadow: 4px 0 20px rgba(0,0,0,.4);
        }

        .side-panel.open {
            display: flex;
        }

        #statsLeft {
            left: 0;
            border-right: 1px solid var(--border-subtle);
        }

        #statsRight {
            right: 0;
            border-left: 1px solid var(--border-subtle);
        }

        .sp-header {
            padding: var(--sp-2) var(--sp-2) var(--sp-1);
            border-bottom: 1px solid var(--border-subtle);
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .08em;
            flex-shrink: 0;
        }

        .sp-body {
            flex: 1;
            overflow-y: auto;
            padding: var(--sp-1) var(--sp-2) var(--sp-2);
        }

        .sp-footer {
            background: var(--bg-sunken);
            border-top: 1px solid var(--border-subtle);
            padding: var(--sp-2);
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: center;
            flex-shrink: 0;
            gap: 2px;
        }

        .sp-footer-label {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--text-muted);
        }

        .sp-footer-val {
            font-size: 16px;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 640px) {
            .side-panel {
                position: fixed;
                top: 88px;
                bottom: 0;
                width: 180px;
                z-index: 40;
                box-shadow: 4px 0 20px rgba(0,0,0,.5);
            }

            #statsLeft {
                left: 0;
                border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
            }

            #statsRight {
                right: 0;
                border-radius: var(--radius-lg) 0 0 var(--radius-lg);
            }

            /* Mobile button optimizations for easier tapping */
            .nd-btn {
                padding: 7px 10px !important;
                font-size: 13px !important;
                min-width: 44px;
                min-height: 44px;
                display: flex !important;
                align-items: center;
                justify-content: center;
            }

            header {
                padding: 7px var(--sp-2) !important;
            }

            #scoreDisplay {
                font-size: clamp(11px, 2vw, 16px) !important;
            }
        }

        .side-panel .player-row {
            grid-template-columns: 26px 1fr 26px 26px 38px;
            padding: var(--sp-1) var(--sp-2);
            gap: 3px;
            font-size: 11px;
        }

        .player-row {
            display: grid;
            grid-template-columns: 32px 1fr 32px 32px 46px;
            align-items: center;
            gap: var(--sp-1);
            padding: var(--sp-1) var(--sp-2);
            border-radius: var(--radius-sm);
            margin-bottom: 3px;
            cursor: pointer;
            transition: opacity .2s, background .15s;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            font-variant-numeric: tabular-nums;
        }

        .player-row:hover {
            background: #1f3040;
        }

        .player-row.dimmed {
            opacity: .28;
        }

        /* ── OVERLAYS ── */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
        }

        .overlay.open {
            pointer-events: auto;
        }

        .ov-bg {
            position: absolute;
            inset: 0;
            background: rgba(15, 25, 35, .88);
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity .25s;
        }

        .overlay.open .ov-bg {
            opacity: 1;
        }

        .drawer {
            position: relative;
            z-index: 1;
            background: var(--bg-elevated);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            border-top: 1px solid var(--border-subtle);
            padding: var(--sp-5) var(--sp-5) max(var(--sp-5), env(safe-area-inset-bottom));
            transform: translateY(105%);
            transition: transform .3s cubic-bezier(.32, 1, .23, 1);
            pointer-events: none;
        }

        .overlay.open .drawer {
            transform: translateY(0);
            pointer-events: auto;
        }

        .drawer-scroll {
            max-height: 72dvh;
            overflow-y: auto;
        }

        .pill {
            width: 48px;
            height: 5px;
            background: var(--border-medium);
            border-radius: var(--radius-full);
            margin: 0 auto 18px;
        }

        /* ── FORM ELEMENTS ── */
        .nd-input {
            background: var(--bg-surface);
            border: 1.5px solid var(--border-medium);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            padding: var(--sp-2) var(--sp-3);
            font-size: 15px;
            font-weight: 700;
            outline: none;
            width: 100%;
            transition: border-color .15s;
            font-family: inherit;
        }

        .nd-input:focus {
            border-color: var(--accent);
        }

        .big-input {
            background: var(--bg-surface);
            border: 2px solid var(--border-medium);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            padding: var(--sp-3) var(--sp-4);
            font-size: 40px;
            font-weight: 900;
            text-align: center;
            outline: none;
            width: 100%;
            transition: border-color .2s;
            font-family: inherit;
            font-variant-numeric: tabular-nums;
        }

        .big-input:focus {
            border-color: var(--accent);
        }

        .nd-btn {
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 900;
            cursor: pointer;
            transition: transform .1s, opacity .1s;
            touch-action: manipulation;
            font-family: inherit;
        }

        .nd-btn:active {
            transform: scale(.96);
            opacity: .85;
        }

        /* chip */
        .chip {
            padding: 7px var(--sp-3);
            border-radius: var(--radius-full);
            border: 2px solid;
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            background: transparent;
            color: inherit;
            transition: background .12s, color .12s;
            touch-action: manipulation;
            font-family: inherit;
        }

        .chip.sel {
            color: var(--bg-base) !important;
        }

        /* quarter chips */
        .q-chip {
            padding: var(--sp-1) var(--sp-3);
            border-radius: var(--radius-full);
            border: 2px solid var(--border-subtle);
            font-size: 12px;
            font-weight: 900;
            color: var(--text-muted);
            background: transparent;
            cursor: pointer;
            transition: background .12s, color .12s, border-color .12s;
            touch-action: manipulation;
            flex-shrink: 0;
            font-family: inherit;
        }

        .q-chip.sel {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-on);
        }

        /* ── MENU ── */
        .menu-btn {
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            width: 100%;
            padding: var(--sp-3) var(--sp-4);
            background: none;
            border: none;
            text-align: left;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            border-bottom: 1px solid var(--border-subtle);
            transition: background .15s;
        }
        .menu-btn:hover { background: rgba(255,255,255,.05); }
        .menu-btn:last-child { border-bottom: none; }
        .menu-btn--danger { color: var(--color-danger); }
        .menu-btn--accent { color: var(--accent); font-weight: 900; }
        .menu-btn svg { flex-shrink: 0; }

        /* ── MODAL PATTERNS ── */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-4);
        }
        .modal-title {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .06em;
            display: flex;
            align-items: center;
            gap: var(--sp-2);
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: var(--sp-1);
        }

        /* ── STAT CARDS ── */
        .stat-card {
            background: rgba(0,0,0,.3);
            padding: var(--sp-3);
            border-radius: var(--radius-sm);
            text-align: center;
        }
        .stat-card__label {
            font-size: 9px;
            color: var(--text-secondary);
            margin-bottom: var(--sp-1);
            font-weight: 700;
        }
        .stat-card__value {
            font-size: 16px;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        /* ── SECTION CARDS ── */
        .section-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: var(--sp-3);
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: var(--radius-full);
        }
    </style>
</head>

<body>

    <!-- ══ HEADER ══ -->
    <header style="background:var(--bg-base);border-bottom:1px solid var(--border-subtle);padding:7px var(--sp-3);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:30;position:relative;gap:var(--sp-2);">
        <!-- Left: Logo -->
        <div style="display:flex;align-items:center;gap:var(--sp-2);min-width:0;">
            <h1 style="color:var(--accent);font-size:18px;font-weight:900;font-style:italic;letter-spacing:-.5px;margin:0;white-space:nowrap;">AND 1 AND DONE</h1>
        </div>

        <!-- Center: Score -->
        <div id="scoreDisplay" style="display:flex;align-items:center;gap:var(--sp-2);font-size:20px;font-weight:900;letter-spacing:.04em;flex:1;justify-content:center;pointer-events:none;white-space:nowrap;font-variant-numeric:tabular-nums;">
            <span id="scoreHome" style="color:#3b82f6;">0</span>
            <span style="color:var(--border-medium);font-size:.8em;">—</span>
            <span id="scoreAway" style="color:#f97316;">0</span>
        </div>

        <!-- Right: Menu Button Only -->
        <div style="position:relative;display:flex;align-items:center;">
            <button id="btnMenu" class="nd-btn" style="background:var(--bg-elevated);padding:7px 10px;color:var(--text-secondary);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div id="menuDropdown" style="display:none;position:absolute;top:100%;right:0;background:var(--bg-base);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);margin-top:var(--sp-1);z-index:50;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.5);">
                <button id="btnUndoMenu" class="menu-btn" title="Undo last shot">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                    Undo
                </button>
                <button id="btnShowAllMenu" class="menu-btn" title="Show all players">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    All
                </button>
                <button id="btnHeatmapMenu" class="menu-btn" title="Heatmap">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 23c-3.6 0-8-2.4-8-7.7 0-4 3.4-7.5 5-9.3.4-.4 1-.4 1.4 0 .6.6 1.4 1.7 2.1 3 .4-.8.8-1.6 1.4-2.2.3-.4.9-.4 1.2 0C17 8.8 20 12.3 20 15.3 20 20.6 15.6 23 12 23z"/></svg>
                    Heatmap
                </button>
                <button id="btnClearMenu" class="menu-btn menu-btn--danger" title="Clear all shots">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                    Clear All
                </button>
                <button id="btnStatsMenu" class="menu-btn" title="View team stats">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>
                    Stats
                </button>
                <button id="btnSetupMenu" class="menu-btn menu-btn--accent">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Setup
                </button>
            </div>
        </div>
    </header>

    <!-- ══ QUARTER BAR ══ -->
    <div id="quarterBar" style="background:var(--bg-sunken);border-bottom:1px solid var(--border-subtle);padding:var(--sp-1) var(--sp-3);display:flex;align-items:center;gap:var(--sp-2);flex-shrink:0;z-index:28;overflow-x:auto;">
        <span style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);flex-shrink:0;">Period</span>
        <button class="q-chip sel" data-q="1">Q1</button>
        <button class="q-chip" data-q="2">Q2</button>
        <button class="q-chip" data-q="3">Q3</button>
        <button class="q-chip" data-q="4">Q4</button>
        <button class="q-chip" data-q="0">All</button>
        <button id="btnPanelToggle" style="margin-left:auto;opacity:.7;background:transparent;border:1px solid var(--border-subtle);border-radius:var(--radius-full);padding:var(--sp-1) var(--sp-3);font-size:12px;color:var(--text-secondary);cursor:pointer;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:var(--sp-1);font-family:inherit;" title="Toggle stats panels">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>
            Panels
        </button>
    </div>

    <!-- ══ BODY ══ -->
    <div style="flex:1;display:flex;overflow:hidden;position:relative;">

        <!-- ══ LEFT STATS PANEL ══ -->
        <div id="statsLeft" class="side-panel">
            <div class="sp-header" id="spLeftHeader"></div>
            <div class="sp-body" id="spLeftBody"></div>
            <div class="sp-footer" id="spLeftFooter"></div>
        </div>

        <!-- Court -->
        <div class="court-container" id="courtContainer">
            <div class="court-wrapper" id="courtWrapper">
                <canvas id="heatCanvas"></canvas>
                <div id="markersLayer"></div>
                <svg id="courtSvg" class="court" viewBox="0 0 940 500" xmlns="http://www.w3.org/2000/svg"
                    preserveAspectRatio="xMidYMid meet">
                    <!-- Floor -->
                    <rect width="940" height="500" class="court-floor" />
                    <!-- Court lines -->
                    <g stroke="#b8ceec" stroke-width="2.5" fill="none" opacity=".80">
                        <rect x="2" y="2" width="936" height="496" stroke-width="5" rx="2" />
                        <line x1="470" y1="2" x2="470" y2="498" stroke-width="3.5" />
                        <circle cx="470" cy="250" r="20" />
                        <circle cx="470" cy="250" r="60" />

    <!-- ══ STATS MODAL ══ -->
    <div class="overlay" id="statsModal">
        <div class="ov-bg" id="statsBg"></div>
        <div class="drawer drawer-scroll" id="statsDrawer" style="max-height:90dvh;overflow-y:auto;">
            <div class="pill"></div>
            <div class="modal-header" style="margin-bottom:18px;">
                <h2 class="modal-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>
                    Game Stats
                </h2>
                <button id="statsClose" class="modal-close">✕</button>
            </div>

            <div id="statsContent" style="display:flex;flex-direction:column;gap:var(--sp-3);">
                <!-- Stats will be rendered here -->
            </div>
        </div>
    </div>

    <script>
        // ══════════════════════════════════
        // CONSTANTS & STATE
        // ══════════════════════════════════
        const SHAPES = ['circle']; // All shapes render as circles
        const DEF_COLORS = ['#3b82f6', '#f97316', '#8b5cf6', '#ec4899'];
        const DEF_NAMES = ['Home', 'Away', 'Team 3', 'Team 4'];

        let teams = JSON.parse(localStorage.getItem('nd_teams')) || [
            { name: 'Home', color: '#3b82f6', shape: 'circle', players: [], active: true },
            { name: 'Away', color: '#f97316', shape: 'square', players: [], active: true },
        ];
        let shots = JSON.parse(localStorage.getItem('nd_shots')) || [];
        let lastPlayer = localStorage.getItem('nd_lastPlayer') || '';
        let lastTeamIdx = +(localStorage.getItem('nd_lastTeam') ?? 0);
        let selTeamIdx = Math.min(lastTeamIdx, teams.length - 1);

        // Set of "teamIdx:playerId" strings that are SELECTED for filtering.
        // Empty = show all.
        let playerFilter = new Set();

        let currentTap = null;
        let heatOn = false;
        let heatObj = null;

        // Quarter & Zone state
        let currentQuarter = 1; // 1-4; 0 = "All"

        // ══════════════════════════════════
        // ELEMENT REFS
        // ══════════════════════════════════
        const courtWrapper = document.getElementById('courtWrapper');
        const markersLayer = document.getElementById('markersLayer');
        const heatCanvas = document.getElementById('heatCanvas');
        const labelLeft = document.getElementById('labelLeft');
        const labelRight = document.getElementById('labelRight');

        const shotModal = document.getElementById('shotModal');
        const shotBg = document.getElementById('shotBg');
        const shotClose = document.getElementById('shotClose');
        const playerNumInput = document.getElementById('playerNumInput');
        const playerChips = document.getElementById('playerChips');
        const modalTeamSel = document.getElementById('modalTeamSel');
        const modalTeamDot = document.getElementById('modalTeamDot');
        const btnMake = document.getElementById('btnMake');
        const btnMiss = document.getElementById('btnMiss');
        const btnFTMake = document.getElementById('btnFTMake');
        const btnFTMiss = document.getElementById('btnFTMiss');

        const setupModal = document.getElementById('setupModal');
        const setupBg = document.getElementById('setupBg');
        const setupClose = document.getElementById('setupClose');
        const teamSetupList = document.getElementById('teamSetupList');

        const statsModal = document.getElementById('statsModal');
        const statsBg = document.getElementById('statsBg');
        const statsClose = document.getElementById('statsClose');
        const statsContent = document.getElementById('statsContent');

        // ══════════════════════════════════
        // INIT
        // ══════════════════════════════════
        function init() {
            syncCanvas();
            window.addEventListener('resize', syncCanvas);
            updateCourtLabels();
            initZones();
            renderAll();
            // Show stats toggle on mobile
            const toggleBtn = document.getElementById('btnStatsToggle');
            if (toggleBtn && window.innerWidth <= 640) toggleBtn.style.display = 'block';
        }
        window.addEventListener('resize', () => {
            const toggleBtn = document.getElementById('btnStatsToggle');
            if (toggleBtn) toggleBtn.style.display = window.innerWidth <= 640 ? 'block' : 'none';
        });

        function syncCanvas() {
            heatCanvas.width = courtWrapper.clientWidth;
            heatCanvas.height = courtWrapper.clientHeight;
        }

        function updateCourtLabels() {
            const c0 = teams[0]?.color || '#3b82f6';
            const c1 = teams[1]?.color || '#f97316';
            labelLeft.textContent  = (teams[0]?.name || 'Home').toUpperCase();
            labelRight.textContent = (teams[1]?.name || 'Away').toUpperCase();
            labelLeft.style.color       = c0;
            labelLeft.style.borderColor = c0;
            labelRight.style.color       = c1;
            labelRight.style.borderColor = c1;
        }

        // Wire up quarter selector
        document.querySelectorAll('.q-chip').forEach(btn => {
            btn.addEventListener('click', () => {
                currentQuarter = +btn.dataset.q;
                document.querySelectorAll('.q-chip').forEach(b => b.classList.remove('sel'));
                btn.classList.add('sel');
                renderAll();
            });
        });

        // Initialize zones
        function initZones() {
            // Legacy zone drawing removed. Zone classification is now handled by classifyZone().
        }

        // ══════════════════════════════════
        // HAMBURGER MENU
        // ══════════════════════════════════
        const btnMenu = document.getElementById('btnMenu');
        const menuDropdown = document.getElementById('menuDropdown');

        btnMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.style.display = menuDropdown.style.display === 'none' ? 'block' : 'none';
        });

        // Close menu when clicking outside
        document.addEventListener('click', () => {
            menuDropdown.style.display = 'none';
        });


        function hexToRgba(hex, a) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${a})`;
        }

        // Normalize player entry to {num, name} format (backward compat)
        function normPlayer(p) {
            if (typeof p === 'string') return { num: p, name: '' };
            return p;
        }

        // Calculate points for a shot (2pt or 3pt)
        function shotPoints(shot) {
            if (!shot.make) return 0;
            if (shot.ft) return 1;
            // Use the same zone classification for consistency
            const zone = classifyZone(shot.x, shot.y, shot.teamIdx);
            return zone === '3-Point' ? 3 : 2;
        }

        // ══════════════════════════════════
        // ZONE CLASSIFICATION
        // ══════════════════════════════════
        function classifyZone(x, y, teamIdx) {
            // x, y are percentages (0-100). Convert to SVG coordinates.
            const svgX = (x / 100) * 940;
            const svgY = (y / 100) * 500;

            // Use teamIdx to pick the correct basket (0=home/left, 1=away/right)
            const shootingAtLeft = teamIdx !== 1;

            if (shootingAtLeft) {
                // Left paint: x < 192 AND y within bounds (paint rect: x=2-192, y=170-330)
                if (svgX < 192 && svgY >= 170 && svgY <= 330) return 'Paint';

                // Left 3PT: Use distance from basket (same as shotPoints)
                // 3PT if distance > 237.5 from basket OR in corner regions
                const dl = Math.hypot(svgX - 54, svgY - 250);
                if (dl > 237.5 || svgY < 45 || svgY > 455) return '3-Point';

                // Everything else on left half is mid-range
                return 'Mid-Range';
            } else {
                // Right paint: x > 748 AND y within bounds (paint rect: x=748-938, y=170-330)
                if (svgX > 748 && svgY >= 170 && svgY <= 330) return 'Paint';

                // Right 3PT: Use distance from basket (same as shotPoints)
                // 3PT if distance > 237.5 from basket OR in corner regions
                const dr = Math.hypot(svgX - 886, svgY - 250);
                if (dr > 237.5 || svgY < 45 || svgY > 455) return '3-Point';

                // Everything else on right half is mid-range
                return 'Mid-Range';
            }
        }

        // Calculate zone stats for a shot list
        function calcZoneStats(shotList) {
            const zones = {
                'Paint': { makes: 0, att: 0 },
                'Mid-Range': { makes: 0, att: 0 },
                '3-Point': { makes: 0, att: 0 },
                'Free Throw': { makes: 0, att: 0 }
            };
            shotList.forEach(s => {
                const zone = s.ft ? 'Free Throw' : classifyZone(s.x, s.y, s.teamIdx);
                zones[zone].att++;
                if (s.make) zones[zone].makes++;
            });
            return zones;
        }

        // ══════════════════════════════════
        // RENDER ALL
        // ══════════════════════════════════
        function renderAll() {
            renderShots();
            renderStats();
            renderScore();
        }

        // ══════════════════════════════════
        // SCORE DISPLAY
        // ══════════════════════════════════
        function renderScore() {
            const pts = teams.map((_, ti) => {
                let p = 0;
                shots.filter(s => s.teamIdx === ti && s.make).forEach(s => {
                    p += shotPoints(s);
                });
                return p;
            });

            const homeEl = document.getElementById('scoreHome');
            const awayEl = document.getElementById('scoreAway');
            if (homeEl) {
                homeEl.textContent = pts[0] ?? 0;
                homeEl.style.color = teams[0]?.color || '#3b82f6';
            }
            if (awayEl) {
                awayEl.textContent = pts[1] ?? 0;
                awayEl.style.color = teams[1]?.color || '#f97316';
            }
        }

        // ══════════════════════════════════
        // IS SHOT VISIBLE?
        // ══════════════════════════════════
        function shotVisible(shot) {
            const team = teams[shot.teamIdx];
            if (!team || !team.active) return false;
            // Quarter filter: 0 = All (no filter). Old shots with no quarter always pass.
            if (currentQuarter !== 0 && shot.quarter != null && shot.quarter !== currentQuarter) return false;
            if (playerFilter.size === 0) return true;
            return playerFilter.has(`${shot.teamIdx}:${shot.playerId}`);
        }

        // ══════════════════════════════════
        // SHOT MARKERS
        // ══════════════════════════════════
        function renderShots() {
            markersLayer.innerHTML = '';
            const heatPts = [];

            shots.forEach(shot => {
                const team = teams[shot.teamIdx];
                if (!team) return;
                const visible = shotVisible(shot);

                if (!heatOn) {
                    const el = document.createElement('div');
                    const shape = team.shape || 'circle';
                    el.className = `sm sm-${shape} ${shot.make ? 'sm-make' : 'sm-miss'}${visible ? '' : ' dimmed'}`;
                    el.style.left = `${shot.x}%`;
                    el.style.top = `${shot.y}%`;

                    if (shape === 'diamond') {
                        el.innerHTML = `<span class="lbl">${shot.playerId}</span>`;
                    } else if (shape === 'triangle') {
                        // triangle: jersey # in title only (no room inside)
                        el.title = `#${shot.playerId} ${shot.make ? 'MAKE' : 'MISS'}`;
                    } else {
                        el.textContent = shot.playerId;
                        el.title = `#${shot.playerId} ${shot.make ? 'MAKE' : 'MISS'} (${team.name})`;
                    }
                    markersLayer.appendChild(el);
                }

                if (heatOn && visible) {
                    const px = (shot.x / 100) * heatCanvas.width;
                    const py = (shot.y / 100) * heatCanvas.height;
                    heatPts.push([px, py, shot.make ? 3 : 1]);
                }
            });

            if (heatOn) {
                heatCanvas.style.display = 'block';
                renderHeatmap(heatPts);
            } else {
                heatCanvas.style.display = 'none';
                const ctx = heatCanvas.getContext('2d');
                ctx.clearRect(0, 0, heatCanvas.width, heatCanvas.height);
                heatObj = null;
            }
        }

        function renderHeatmap(pts) {
            // Built-in canvas heatmap (no external lib needed – simpler & more reliable)
            const ctx = heatCanvas.getContext('2d');
            ctx.clearRect(0, 0, heatCanvas.width, heatCanvas.height);
            pts.forEach(([x, y, w]) => {
                const r = 36 * (heatCanvas.width / 860);
                const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                const alpha = Math.min(0.55, 0.15 * w);
                grad.addColorStop(0, `rgba(239,68,68,${alpha})`);
                grad.addColorStop(0.4, `rgba(251,191,36,${alpha * .6})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
            });
        }

        // ══════════════════════════════════
        // SPLIT STATS PANELS
        // ══════════════════════════════════
        function renderStats() {
            renderTeamPanel(0, 'spLeftHeader', 'spLeftBody', 'spLeftFooter');
            renderTeamPanel(1, 'spRightHeader', 'spRightBody', 'spRightFooter');
        }

        function renderTeamPanel(ti, headerId, bodyId, footerId) {
            const team = teams[ti];
            if (!team) return;

            const headerEl = document.getElementById(headerId);
            const bodyEl = document.getElementById(bodyId);
            const footerEl = document.getElementById(footerId);
            if (!headerEl || !bodyEl || !footerEl) return;

            // Header: team name + ON/OFF toggle
            const shapeIcon = { circle: '◯', square: '▢', diamond: '◆', triangle: '△' }[team.shape] || '◯';
            headerEl.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;">
                    <span style="color:${team.color};display:flex;align-items:center;gap:var(--sp-1);"><span style="font-size:11px;">${shapeIcon}</span> <span style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;">${team.name}</span></span>
                    <button onclick="toggleTeamActive(${ti})" style="font-size:8px;padding:2px 6px;border-radius:var(--radius-sm);background:${team.active ? team.color : 'transparent'};border:1px solid ${team.color};color:${team.active ? 'var(--bg-base)' : team.color};cursor:pointer;font-weight:900;font-family:inherit;">
                        ${team.active ? 'ON' : 'OFF'}
                    </button>
                </div>`;

            // Player rows
            bodyEl.innerHTML = '';
            const teamShots = shots.filter(s => s.teamIdx === ti && shotVisible(s));
            const playerNums = [...new Set([
                ...team.players.map(p => normPlayer(p).num),
                ...shots.filter(s => s.teamIdx === ti).map(s => s.playerId)
            ])];

            let totMakes = 0, totAtt = 0, totPts = 0;

            playerNums.forEach(pid => {
                const player = normPlayer(team.players.find(p => normPlayer(p).num === pid) || pid);
                const ps = teamShots.filter(s => s.playerId === pid);
                const allPs = shots.filter(s => s.teamIdx === ti && s.playerId === pid);
                const makes = ps.filter(s => s.make).length;
                const att = ps.length;
                const pct = att > 0 ? Math.round((makes / att) * 100) : null;
                const pts = ps.filter(s => s.make).reduce((a, s) => a + shotPoints(s), 0);
                totMakes += makes; totAtt += att; totPts += pts;

                const key = `${ti}:${pid}`;
                const isFiltered = playerFilter.size > 0 && !playerFilter.has(key);
                const pctColor = pct === null ? 'var(--text-muted)' : pct >= 50 ? 'var(--color-make)' : pct >= 30 ? 'var(--color-fg-pct)' : 'var(--color-miss)';

                const row = document.createElement('div');
                row.className = `player-row${isFiltered ? ' dimmed' : ''}`;
                const shapeStyle = team.shape === 'circle' ? 'border-radius:50%' : team.shape === 'square' ? 'border-radius:4px' : 'border-radius:50%';
                row.innerHTML = `
                    <div style="width:24px;height:24px;${shapeStyle};border:2px solid ${team.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:${team.color};background:rgba(0,0,0,.4);">${pid}</div>
                    <div style="overflow:hidden;">
                        <div style="font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                            ${player.name ? player.name : `#${pid}`}
                        </div>
                        <div style="font-size:8px;color:var(--text-faint);">${pts}pts</div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:11px;font-weight:900;color:var(--color-make);">${makes}</div>

        function toggleTeamActive(ti) {
            teams[ti].active = !teams[ti].active;
            saveTeams();
            renderAll();
        }

        // ══════════════════════════════════
        // COURT CLICK (mouse & touch)
        // ══════════════════════════════════
        function handleCourtTap(clientX, clientY) {
            const r = courtWrapper.getBoundingClientRect();
            let x = Math.max(.5, Math.min(99.5, ((clientX - r.left) / r.width) * 100));
            const y = Math.max(.5, Math.min(99.5, ((clientY - r.top) / r.height) * 100));

            // Full-court shots allowed. Zone classification uses teamIdx, not x position.
            const selectedTeam = teams[selTeamIdx] || teams[0];
            const teamIdx = teams.indexOf(selectedTeam);

            currentTap = { x, y };
            haptic('tap');
            openShot();
        }

        courtWrapper.addEventListener('click', e => {
            if (e.target.closest('.sm')) return;
            handleCourtTap(e.clientX, e.clientY);
        });

        // Touch support for mobile
        courtWrapper.addEventListener('touchstart', e => {
            if (e.target.closest('.sm')) return;
            const touch = e.touches[0];
            handleCourtTap(touch.clientX, touch.clientY);
        }, { passive: false });

        // ══════════════════════════════════
        // SHOT MODAL
        // ══════════════════════════════════
        function openShot() {
            buildTeamSel();
            buildChips();
            playerNumInput.value = lastPlayer;
            shotModal.classList.add('open');
            setTimeout(() => playerNumInput.focus(), 320);
        }
        function closeShot() {
            shotModal.classList.remove('open');
            setTimeout(() => { currentTap = null; playerNumInput.blur(); }, 280);
        }
        shotBg.addEventListener('click', closeShot);
        shotClose.addEventListener('click', closeShot);

        function buildTeamSel() {
            modalTeamSel.innerHTML = '';
            const team = teams[selTeamIdx] || teams[0];
            modalTeamDot.style.background = team.color;

            teams.forEach((t, i) => {
                const btn = document.createElement('button');
                btn.className = 'chip' + (i === selTeamIdx ? ' sel' : '');
                btn.style.borderColor = t.color;
                btn.style.color = i === selTeamIdx ? 'var(--bg-base)' : t.color;
                if (i === selTeamIdx) btn.style.background = t.color;
                btn.textContent = t.name;
                btn.onclick = () => {
                    selTeamIdx = i;
                    lastTeamIdx = i;
                    localStorage.setItem('nd_lastTeam', i);
                    buildTeamSel();
                    buildChips();
                };
                modalTeamSel.appendChild(btn);
            });
        }

        function buildChips() {
            playerChips.innerHTML = '';
            const team = teams[selTeamIdx] || teams[0];
            if (!team.players.length) {
                playerChips.innerHTML = '<span style="font-size:11px;color:var(--text-faint);font-style:italic;align-self:center;">Type a jersey # below, or add players in Setup</span>';
                return;
            }
            team.players.forEach(p => {
                const player = normPlayer(p);
                const pid = player.num;
                const btn = document.createElement('button');
                btn.className = 'chip' + (pid === lastPlayer ? ' sel' : '');
                btn.style.borderColor = team.color;
                btn.style.color = pid === lastPlayer ? 'var(--bg-base)' : team.color;
                if (pid === lastPlayer) btn.style.background = team.color;
                const label = player.name ? `#${pid} ${player.name}` : `#${pid}`;
                btn.textContent = label;
                btn.onclick = () => {
                    lastPlayer = pid;
                    playerNumInput.value = pid;
                    buildChips();
                };
                playerChips.appendChild(btn);
            });
        }

        function recordShot(make) {
            if (!currentTap) return;
            let pid = String(playerNumInput.value).trim();
            if (!pid) pid = '?';
            pid = pid.substring(0, 3);

            lastPlayer = pid;
            localStorage.setItem('nd_lastPlayer', pid);

            const team = teams[selTeamIdx] || teams[0];
            if (pid !== '?' && !team.players.some(p => normPlayer(p).num === pid)) {
                team.players.push({ num: pid, name: '' });
                saveTeams();
            }

            shots.push({ id: Date.now(), playerId: pid, teamIdx: selTeamIdx, make, x: currentTap.x, y: currentTap.y, quarter: currentQuarter === 0 ? null : currentQuarter, ts: new Date().toISOString() });
            saveShots();
            haptic(make ? 'make' : 'miss');
            closeShot();
            renderAll();
        }

        btnMake.addEventListener('click', () => recordShot(true));
        btnMiss.addEventListener('click', () => recordShot(false));

        function recordFreeThrow(make) {
            const pid = playerChips.value || '?';
            lastPlayer = pid;
            localStorage.setItem('nd_lastPlayer', pid);

            const team = teams[selTeamIdx] || teams[0];
            if (pid !== '?' && !team.players.some(p => normPlayer(p).num === pid)) {
                team.players.push({ num: pid, name: '' });
                saveTeams();
            }

            // FT shots go at the free throw line center: home x=21%, away x=79%, y=50%
            const ftX = selTeamIdx === 0 ? 21 : 79;
            const ftY = 50;

            shots.push({ id: Date.now(), playerId: pid, teamIdx: selTeamIdx, make, x: ftX, y: ftY, ft: true, quarter: currentQuarter === 0 ? null : currentQuarter, ts: new Date().toISOString() });
            saveShots();
            haptic(make ? 'make' : 'miss');
            closeShot();
            renderAll();
        }

        btnFTMake.addEventListener('click', () => recordFreeThrow(true));
        btnFTMiss.addEventListener('click', () => recordFreeThrow(false));
        playerNumInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); recordShot(true); } });

        // ══════════════════════════════════
        // SETUP MODAL
        // ══════════════════════════════════
        const openSetupModal = () => {

        }
        function closeStats() { statsModal.classList.remove('open'); }
        statsBg.addEventListener('click', closeStats);
        statsClose.addEventListener('click', closeStats);
        document.getElementById('btnStatsMenu').onclick = openStatsModal;

        function showPlayerDetail(teamIdx, pid, playerName, playerShots) {

                ['Paint', 'Mid-Range', '3-Point', 'Free Throw'].forEach(zoneName => {

                    row.innerHTML = `
        <input type="text" class="pe-num nd-input" placeholder="#" value="${player.num}" style="font-weight:900;text-align:center;">
        <input type="text" class="pe-name nd-input" placeholder="Name (optional)" value="${player.name || ''}">
        <button type="button" class="nd-btn" style="background:var(--bg-elevated);color:var(--color-danger);padding:var(--sp-1) var(--sp-2);font-size:12px;">✕</button>
      `;
                    row.querySelector('button').onclick = () => row.remove();
                    entriesContainer.appendChild(row);
                });

                // Add player button
                sec.querySelector(`#btnAddPlayer_${i}`).onclick = () => {
                    const row = document.createElement('div');
                    row.className = 'player-entry-row';
                    row.style.cssText = 'display:grid;grid-template-columns:80px 1fr 28px;gap:var(--sp-2);';
                    row.innerHTML = `
        <input type="text" class="pe-num nd-input" placeholder="#" style="font-weight:900;text-align:center;">
        <input type="text" class="pe-name nd-input" placeholder="Name (optional)">
        <button type="button" class="nd-btn" style="background:var(--bg-elevated);color:var(--color-danger);padding:var(--sp-1) var(--sp-2);font-size:12px;">✕</button>
      `;
                    row.querySelector('button').onclick = () => row.remove();
                    entriesContainer.appendChild(row);
                };

                // Live color preview on color input
                sec.querySelector(`#tc_${i}`).addEventListener('input', e => {
                    const colorVal = e.target.value;
                    const badge = sec.querySelector('span');
                    badge.style.color = colorVal;
                    badge.style.borderColor = colorVal;
                });
                teamSetupList.appendChild(sec);
            });
        }

        document.getElementById('btnSaveSetup').onclick = () => {
            teams.forEach((team, i) => {
                team.color = document.getElementById(`tc_${i}`).value;
                team.name = document.getElementById(`tn_${i}`).value.trim() || DEF_NAMES[i];

                // Read player entries from the dynamic form
                const sec = teamSetupList.children[i];
                if (sec) {
                    const entries = [...sec.querySelectorAll('.player-entry-row')];
                    team.players = entries
                        .map(row => {
                            const num = row.querySelector('.pe-num').value.trim();
                            const name = row.querySelector('.pe-name').value.trim();
                            return num ? { num, name } : null;
                        })
                        .filter(Boolean);
                }
            });
            saveTeams();
            closeSetup();
            updateCourtLabels();
            renderAll();
        };

        // ══════════════════════════════════
        // HEATMAP TOGGLE
        // ══════════════════════════════════
        const toggleHeatmap = function () {
            heatOn = !heatOn;
            renderShots();
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        const btnHeatmapOld = document.getElementById('btnHeatmap');
        if (btnHeatmapOld) btnHeatmapOld.onclick = toggleHeatmap;
        document.getElementById('btnHeatmapMenu').onclick = toggleHeatmap;

        // ══════════════════════════════════
        // SHOW ALL / CLEAR
        // ══════════════════════════════════
        const doShowAll = () => {
            playerFilter.clear();
            renderAll();
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        const btnShowAllOld = document.getElementById('btnShowAll');
        if (btnShowAllOld) btnShowAllOld.onclick = doShowAll;
        document.getElementById('btnShowAllMenu').onclick = doShowAll;

        const doClear = () => {
            if (confirm('Clear all shot data?')) {
                shots = [];
                saveShots();
                playerFilter.clear();
                renderAll();
                haptic('miss');
            }
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        const btnClearOld = document.getElementById('btnClear');
        if (btnClearOld) btnClearOld.onclick = doClear;
        document.getElementById('btnClearMenu').onclick = doClear;

        // ══════════════════════════════════
        // UNDO LAST SHOT
        // ══════════════════════════════════
        const doUndo = () => {
            if (shots.length === 0) return;
            shots.pop();
            saveShots();
            renderAll();
            haptic('tap');
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        const btnUndoOld = document.getElementById('btnUndo');
        if (btnUndoOld) btnUndoOld.onclick = doUndo;
        const btnUndoMenu = document.getElementById('btnUndoMenu');
        if (btnUndoMenu) btnUndoMenu.onclick = doUndo;

        // ══════════════════════════════════
        // STATS PANEL TOGGLE
        // ══════════════════════════════════
        let panelsVisible = false;

        document.getElementById('btnPanelToggle').addEventListener('click', () => {
            panelsVisible = !panelsVisible;
            const left = document.getElementById('statsLeft');
            const right = document.getElementById('statsRight');
            const btn = document.getElementById('btnPanelToggle');
            if (panelsVisible) {
                left.classList.add('open');
                right.classList.add('open');
                btn.style.opacity = '1';
                btn.style.color = 'var(--color-fg-pct)';
            } else {
                left.classList.remove('open');
                right.classList.remove('open');
                btn.style.opacity = '.7';
                btn.style.color = '';
            }
            syncCanvas();
        });

        // ══════════════════════════════════
        // PERSISTENCE
        // ══════════════════════════════════
        function saveShots() { localStorage.setItem('nd_shots', JSON.stringify(shots)); }
        function saveTeams() { localStorage.setItem('nd_teams', JSON.stringify(teams)); }

        // ══════════════════════════════════
        // HAPTIC
        // ══════════════════════════════════
        function haptic(t) {
            if (!navigator.vibrate) return;
            if (t === 'make') navigator.vibrate([15, 30, 15]);
            else if (t === 'miss') navigator.vibrate(50);
            else navigator.vibrate(10);
        }

        // ══════════════════════════════════
        // GO
        // ══════════════════════════════════
        init();
    </script>
</body>

</html>
