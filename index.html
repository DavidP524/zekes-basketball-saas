<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1 and Done – Shot Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0B162A;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        /* ── COURT ── */
        .court-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            position: relative;
            overflow: hidden;
        }

        .court-wrapper {
            position: relative;
            width: 100%;
            max-width: 860px;
            aspect-ratio: 940 / 500;
            max-height: 100%;
        }

        svg.court {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        #heatCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: .8;
            display: none;
        }

        #markersLayer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* ── SHOT MARKERS ── */
        .sm {
            position: absolute;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            transform: translate(-50%, -50%);
            color: white;
            border: 2.5px solid;
            box-shadow: 0 2px 6px rgba(0, 0, 0, .7);
            cursor: default;
            transition: transform .12s, opacity .2s;
            user-select: none;
        }

        .sm:hover {
            transform: translate(-50%, -50%) scale(1.35);
            z-index: 20;
        }

        .sm.dimmed {
            opacity: .18;
        }

        .sm-circle {
            border-radius: 50%;
        }

        .sm-square {
            border-radius: 4px;
        }

        .sm-diamond {
            border-radius: 3px;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .sm-diamond .lbl {
            transform: rotate(-45deg);
            display: block;
        }

        .sm-triangle {
            width: 0;
            height: 0;
            background: transparent !important;
            box-shadow: none;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom-width: 26px;
            border-bottom-style: solid;
            border-top: none;
            border-radius: 0;
            display: flex;
            align-items: flex-end;
            padding-bottom: 2px;
        }

        /* make = solid green, miss = dashed red */
        .sm-make {
            border-color: #22c55e;
            border-style: solid;
            background: rgba(34, 197, 94, .12);
        }

        .sm-miss {
            border-color: #C83803;
            border-style: dashed;
            background: rgba(200, 56, 3, .08);
        }

        .sm-triangle.sm-make {
            border-bottom-color: #22c55e;
        }

        .sm-triangle.sm-miss {
            border-bottom-color: #C83803;
        }

        /* ── SPLIT STATS PANELS ── */
        .side-panel {
            width: 160px;
            flex-shrink: 0;
            background: #0a1628;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #statsLeft {
            border-right: 1px solid #1e3254;
        }

        #statsRight {
            border-left: 1px solid #1e3254;
        }

        .sp-header {
            padding: 8px 8px 4px;
            border-bottom: 1px solid #1e3254;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .08em;
            flex-shrink: 0;
        }

        .sp-body {
            flex: 1;
            overflow-y: auto;
            padding: 4px 6px 8px;
        }

        .sp-footer {
            background: #080f1e;
            border-top: 1px solid #1a2d4a;
            padding: 8px 6px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: center;
            flex-shrink: 0;
            gap: 2px;
        }

        .sp-footer-label {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #4a6080;
        }

        .sp-footer-val {
            font-size: 16px;
            font-weight: 900;
        }

        @media (max-width: 640px) {
            .side-panel {
                display: none;
                position: fixed;
                top: 88px;
                bottom: 0;
                width: 180px;
                z-index: 40;
                box-shadow: 4px 0 20px rgba(0,0,0,.5);
            }

            #statsLeft {
                left: 0;
                border-radius: 0 12px 12px 0;
                border-right: 1px solid #1e3254;
            }

            #statsRight {
                right: 0;
                border-radius: 12px 0 0 12px;
                border-left: 1px solid #1e3254;
            }

            .side-panel.open {
                display: flex;
            }

            /* Mobile button optimizations for easier tapping */
            .nd-btn {
                padding: 10px 14px !important;
                font-size: 13px !important;
                min-width: 44px;
                min-height: 44px;
                display: flex !important;
                align-items: center;
                justify-content: center;
            }

            header {
                padding: 12px 8px !important;
            }

            #scoreDisplay {
                font-size: clamp(11px, 2vw, 16px) !important;
            }
        }

        .side-panel .player-row {
            grid-template-columns: 26px 1fr 26px 26px 38px;
            padding: 4px 6px;
            gap: 3px;
            font-size: 11px;
        }

        .player-row {
            display: grid;
            grid-template-columns: 32px 1fr 32px 32px 46px;
            align-items: center;
            gap: 4px;
            padding: 5px 8px;
            border-radius: 8px;
            margin-bottom: 3px;
            cursor: pointer;
            transition: opacity .2s, background .15s;
            background: #0e1e38;
            border: 1px solid #1e3254;
        }

        .player-row:hover {
            background: #142338;
        }

        .player-row.dimmed {
            opacity: .28;
        }

        /* ── OVERLAYS ── */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
        }

        .overlay.open {
            pointer-events: auto;
        }

        .ov-bg {
            position: absolute;
            inset: 0;
            background: rgba(11, 22, 42, .88);
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity .25s;
        }

        .overlay.open .ov-bg {
            opacity: 1;
        }

        .drawer {
            position: relative;
            z-index: 1;
            background: #111c30;
            width: 100%;
            max-width: 480px;
            border-radius: 20px 20px 0 0;
            border-top: 1px solid #1e3254;
            padding: 20px 20px max(20px, env(safe-area-inset-bottom));
            transform: translateY(105%);
            transition: transform .3s cubic-bezier(.32, 1, .23, 1);
            pointer-events: none;
        }

        .overlay.open .drawer {
            transform: translateY(0);
            pointer-events: auto;
        }

        .drawer-scroll {
            max-height: 72dvh;
            overflow-y: auto;
        }

        .pill {
            width: 48px;
            height: 5px;
            background: #2a3c5a;
            border-radius: 99px;
            margin: 0 auto 18px;
        }

        /* ── FORM ELEMENTS ── */
        .nd-input {
            background: #0a1628;
            border: 1.5px solid #2a3c5a;
            border-radius: 10px;
            color: white;
            padding: 8px 12px;
            font-size: 15px;
            font-weight: 700;
            outline: none;
            width: 100%;
            transition: border-color .15s;
        }

        .nd-input:focus {
            border-color: #C83803;
        }

        .big-input {
            background: #0a1628;
            border: 2px solid #2a3c5a;
            border-radius: 14px;
            color: white;
            padding: 14px 16px;
            font-size: 40px;
            font-weight: 900;
            text-align: center;
            outline: none;
            width: 100%;
            transition: border-color .2s;
        }

        .big-input:focus {
            border-color: #C83803;
        }

        .nd-btn {
            border: none;
            border-radius: 14px;
            font-weight: 900;
            cursor: pointer;
            transition: transform .1s, opacity .1s;
            touch-action: manipulation;
        }

        .nd-btn:active {
            transform: scale(.96);
            opacity: .85;
        }

        /* chip */
        .chip {
            padding: 7px 14px;
            border-radius: 99px;
            border: 2px solid;
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            background: transparent;
            color: inherit;
            transition: background .12s, color .12s;
            touch-action: manipulation;
        }

        .chip.sel {
            color: #0B162A !important;
        }

        /* quarter chips */
        .q-chip {
            padding: 4px 12px;
            border-radius: 99px;
            border: 2px solid #1e3254;
            font-size: 12px;
            font-weight: 900;
            color: #4a6080;
            background: transparent;
            cursor: pointer;
            transition: background .12s, color .12s, border-color .12s;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .q-chip.sel {
            background: #C83803;
            border-color: #C83803;
            color: white;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a3c5a;
            border-radius: 99px;
        }

        /* zone circles */
        .zone-circle {
            fill: none;
            stroke-width: 2;
            cursor: pointer;
        }

        .zone-circle:hover {
            stroke-width: 3;
        }

        /* zone label */
        .zone-label {
            font-size: 13px;
            font-weight: 900;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
            fill: white;
            text-shadow: 0 1px 3px rgba(0,0,0,.8);
        }

        /* zone FG% */
        .zone-fg {
            font-size: 11px;
            font-weight: 700;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }

        /* draft circle (while drawing) */
        #zoneDraftCircle {
            fill: rgba(200,56,3,.08);
            stroke: #C83803;
            stroke-width: 2;
            stroke-dasharray: 6,4;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <!-- ══ HEADER ══ -->
    <header
        style="background:#0B162A;border-bottom:1px solid #1e3254;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:30;position:relative;gap:8px;">
        <!-- Left: Logo -->
        <div style="display:flex;align-items:center;gap:8px;min-width:0;">
            <h1 style="color:#C83803;font-size:18px;font-weight:900;font-style:italic;letter-spacing:-.5px;margin:0;white-space:nowrap;">1 AND DONE</h1>
        </div>

        <!-- Center: Score -->
        <div id="scoreDisplay" style="display:flex;align-items:center;gap:8px;font-size:16px;font-weight:900;letter-spacing:.04em;flex:1;justify-content:center;pointer-events:none;white-space:nowrap;">
            <span id="scoreHome" style="color:#3b82f6;">0</span>
            <span style="color:#2a3c5a;font-size:.8em;">—</span>
            <span id="scoreAway" style="color:#f97316;">0</span>
        </div>

        <!-- Right: Menu Button Only -->
        <div style="position:relative;display:flex;align-items:center;">
            <button id="btnMenu" class="nd-btn"
                style="background:#1a2d4a;padding:12px 14px;font-size:18px;color:#94a3b8;cursor:pointer;flex-shrink:0;">☰</button>
            <div id="menuDropdown" style="
                display:none;
                position:absolute;
                top:100%;
                right:0;
                background:#0B162A;
                border:1px solid #1e3254;
                border-radius:8px;
                margin-top:4px;
                z-index:50;
                min-width:180px;
                box-shadow:0 8px 24px rgba(0,0,0,.4);">
                <button id="btnUndoMenu" style="
                    display:block;
                    width:100%;
                    padding:14px 16px;
                    background:none;
                    border:none;
                    text-align:left;
                    color:#94a3b8;
                    cursor:pointer;
                    font-size:14px;
                    border-bottom:1px solid #1e3254;
                    transition:background .15s;
                " title="Undo last shot">↩ Undo</button>
                <button id="btnZonesMenu" style="
                    display:block;
                    width:100%;
                    padding:14px 16px;
                    background:none;
                    border:none;
                    text-align:left;
                    color:#94a3b8;
                    cursor:pointer;
                    font-size:14px;
                    border-bottom:1px solid #1e3254;
                    transition:background .15s;
                " title="Toggle zones">🔲 Zones</button>
                <button id="btnZoneDrawMenu" style="
                    display:none;
                    width:100%;
                    padding:14px 16px;
                    background:none;
                    border:none;
                    text-align:left;
                    color:#94a3b8;
                    cursor:pointer;
                    font-size:14px;
                    border-bottom:1px solid #1e3254;
                    transition:background .15s;
                " title="Draw zone">✏ Draw</button>
                <button id="btnShowAllMenu" style="
                    display:block;
                    width:100%;
                    padding:14px 16px;
                    background:none;
                    border:none;
                    text-align:left;
                    color:#94a3b8;
                    cursor:pointer;
                    font-size:14px;
                    border-bottom:1px solid #1e3254;
                    transition:background .15s;
                " title="Show all players">🔄 All</button>
                <button id="btnHeatmapMenu" style="
                    display:block;
                    width:100%;
                    padding:14px 16px;
                    background:none;
                    border:none;
                    text-align:left;
                    color:#94a3b8;
                    cursor:pointer;
                    font-size:14px;
                    border-bottom:1px solid #1e3254;
                    transition:background .15s;
                " title="Heatmap">🔥 Heatmap</button>
                <button id="btnClearMenu" style="
                    display:block;
                    width:100%;
                    padding:14px 16px;
                    background:none;
                    border:none;
                    text-align:left;
                    color:#f87171;
                    cursor:pointer;
                    font-size:14px;
                    border-bottom:1px solid #1e3254;
                    transition:background .15s;
                " title="Clear all shots">🗑 Clear All</button>
                <button id="btnSetupMenu" style="
                    display:block;
                    width:100%;
                    padding:14px 16px;
                    background:none;
                    border:none;
                    text-align:left;
                    color:#C83803;
                    cursor:pointer;
                    font-size:14px;
                    font-weight:900;
                    transition:background .15s;
                ">⚙ Setup</button>
            </div>
        </div>
    </header>

    <!-- ══ QUARTER BAR ══ -->
    <div id="quarterBar" style="background:#080f1e;border-bottom:1px solid #1e3254;padding:5px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:28;overflow-x:auto;">
        <span style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:#3a5070;flex-shrink:0;">Period</span>
        <button class="q-chip sel" data-q="1">Q1</button>
        <button class="q-chip" data-q="2">Q2</button>
        <button class="q-chip" data-q="3">Q3</button>
        <button class="q-chip" data-q="4">Q4</button>
        <button class="q-chip" data-q="0">All</button>
    </div>

    <!-- ══ BODY ══ -->
    <div style="flex:1;display:flex;overflow:hidden;">

        <!-- ══ LEFT STATS PANEL ══ -->
        <div id="statsLeft" class="side-panel">
            <div class="sp-header" id="spLeftHeader"></div>
            <div class="sp-body" id="spLeftBody"></div>
            <div class="sp-footer" id="spLeftFooter"></div>
        </div>

        <!-- Court -->
        <div class="court-container" id="courtContainer">
            <div class="court-wrapper" id="courtWrapper">
                <canvas id="heatCanvas"></canvas>
                <div id="markersLayer"></div>
                <svg id="courtSvg" class="court" viewBox="0 0 940 500" xmlns="http://www.w3.org/2000/svg"
                    preserveAspectRatio="xMidYMid meet">
                    <!-- Floor -->
                    <rect width="940" height="500" fill="#0d1e3a" />
                    <!-- Court lines -->
                    <g stroke="#b8ceec" stroke-width="2.5" fill="none" opacity=".65">
                        <rect x="2" y="2" width="936" height="496" stroke-width="5" rx="2" />
                        <line x1="470" y1="2" x2="470" y2="498" stroke-width="3.5" />
                        <circle cx="470" cy="250" r="20" />
                        <circle cx="470" cy="250" r="60" />
                        <!-- LEFT side -->
                        <rect x="2" y="170" width="190" height="160" fill="rgba(255,255,255,.03)" />
                        <rect x="2" y="190" width="190" height="120" />
                        <path d="M190,190 A60,60 0 0,1 190,310" stroke-dasharray="7,5" />
                        <path d="M190,310 A60,60 0 0,1 190,190" />
                        <line x1="2" y1="45" x2="140" y2="45" />
                        <line x1="2" y1="455" x2="140" y2="455" />
                        <path d="M140,45 A237.5,237.5 0 0,1 140,455" />
                        <line x1="42" y1="218" x2="42" y2="282" stroke-width="5" stroke="white" />
                        <circle cx="54" cy="250" r="8.5" stroke="#C83803" stroke-width="3" fill="rgba(200,56,3,.15)" />
                        <path d="M205,215 A55,55 0 0,1 205,285" stroke="rgba(180,210,240,.25)" stroke-dasharray="4,4" />
                        <!-- RIGHT side -->
                        <rect x="748" y="170" width="190" height="160" fill="rgba(255,255,255,.03)" />
                        <rect x="748" y="190" width="190" height="120" />
                        <path d="M750,310 A60,60 0 0,1 750,190" stroke-dasharray="7,5" />
                        <path d="M750,190 A60,60 0 0,1 750,310" />
                        <line x1="938" y1="45" x2="800" y2="45" />
                        <line x1="938" y1="455" x2="800" y2="455" />
                        <path d="M800,455 A237.5,237.5 0 0,1 800,45" />
                        <line x1="898" y1="218" x2="898" y2="282" stroke-width="5" stroke="white" />
                        <circle cx="886" cy="250" r="8.5" stroke="#C83803" stroke-width="3" fill="rgba(200,56,3,.15)" />
                        <path d="M735,215 A55,55 0 0,0 735,285" stroke="rgba(180,210,240,.25)" stroke-dasharray="4,4" />
                    </g>
                    <!-- SVG labels removed — replaced by HTML overlays below -->
                </svg>

                <!-- ══ ZONE LAYER (SVG OVERLAY) ══ -->
                <svg id="zoneLayer"
                     viewBox="0 0 940 500"
                     preserveAspectRatio="xMidYMid meet"
                     style="position:absolute;inset:0;width:100%;height:100%;z-index:12;display:none;pointer-events:none;touch-action:none;">
                     <!-- zones rendered dynamically here -->
                </svg>

                <!-- ── BIG TEAM LABELS (HTML overlay) ── -->
                <div id="labelLeft" style="
                    position:absolute;
                    bottom:6px;
                    left:6px;
                    font-size:clamp(13px,3.2vw,22px);
                    font-weight:900;
                    font-style:italic;
                    letter-spacing:.08em;
                    text-transform:uppercase;
                    pointer-events:none;
                    z-index:15;
                    padding:4px 10px;
                    border-radius:8px;
                    border-left:4px solid;
                    background:rgba(0,0,0,.45);
                    backdrop-filter:blur(4px);
                    line-height:1;
                    text-shadow:0 1px 4px rgba(0,0,0,.8);
                ">HOME</div>

                <div id="labelRight" style="
                    position:absolute;
                    bottom:6px;
                    right:6px;
                    font-size:clamp(13px,3.2vw,22px);
                    font-weight:900;
                    font-style:italic;
                    letter-spacing:.08em;
                    text-transform:uppercase;
                    pointer-events:none;
                    z-index:15;
                    padding:4px 10px;
                    border-radius:8px;
                    border-right:4px solid;
                    background:rgba(0,0,0,.45);
                    backdrop-filter:blur(4px);
                    line-height:1;
                    text-shadow:0 1px 4px rgba(0,0,0,.8);
                ">AWAY</div>
            </div>
        </div>

        <!-- ══ RIGHT STATS PANEL ══ -->
        <div id="statsRight" class="side-panel">
            <div class="sp-header" id="spRightHeader"></div>
            <div class="sp-body" id="spRightBody"></div>
            <div class="sp-footer" id="spRightFooter"></div>
        </div>
    </div>

    <!-- ══ SHOT MODAL ══ -->
    <div class="overlay" id="shotModal">
        <div class="ov-bg" id="shotBg"></div>
        <div class="drawer" id="shotDrawer">
            <div class="pill"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                <h3
                    style="font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:8px;">
                    <span id="modalTeamDot"
                        style="width:10px;height:10px;border-radius:50%;display:inline-block;"></span>
                    Log Shot
                </h3>
                <button id="shotClose"
                    style="background:none;border:none;color:#4a6080;font-size:20px;cursor:pointer;padding:4px;">✕</button>
            </div>

            <!-- Team selector -->
            <div id="modalTeamSel" style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;"></div>

            <!-- Player chips -->
            <div id="playerChips" style="display:flex;flex-wrap:wrap;gap:7px;min-height:38px;margin-bottom:14px;"></div>

            <!-- Number input -->
            <div style="position:relative;margin-bottom:16px;">
                <span
                    style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:28px;font-weight:900;color:#2a3c5a;">#</span>
                <input id="playerNumInput" class="big-input" type="number" inputmode="numeric" placeholder="00">
            </div>

            <!-- Make / Miss -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <button id="btnMake" class="nd-btn"
                    style="padding:28px 10px;font-size:22px;font-weight:900;letter-spacing:.05em;color:#22c55e;border:2px solid #22c55e;background:rgba(34,197,94,.07);">MAKE
                    ✓</button>
                <button id="btnMiss" class="nd-btn"
                    style="padding:28px 10px;font-size:22px;font-weight:900;letter-spacing:.05em;color:#C83803;border:2px solid #C83803;background:rgba(200,56,3,.07);">MISS
                    ✗</button>
            </div>
        </div>
    </div>

    <!-- ══ SETUP MODAL ══ -->
    <div class="overlay" id="setupModal">
        <div class="ov-bg" id="setupBg"></div>
        <div class="drawer drawer-scroll" id="setupDrawer" style="max-height:85dvh;overflow-y:auto;">
            <div class="pill"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
                <h2 style="font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;">⚙ Game Setup
                </h2>
                <button id="setupClose"
                    style="background:none;border:none;color:#4a6080;font-size:20px;cursor:pointer;padding:4px;">✕</button>
            </div>

            <div id="teamSetupList" style="display:flex;flex-direction:column;gap:14px;"></div>

            <button id="btnSaveSetup" class="nd-btn"
                style="width:100%;margin-top:20px;padding:16px;font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;background:#C83803;color:white;border-radius:14px;">
                Save & Start
            </button>
        </div>
    </div>

    <script>
        // ══════════════════════════════════
        // CONSTANTS & STATE
        // ══════════════════════════════════
        const SHAPES = ['circle', 'square', 'diamond', 'triangle'];
        const DEF_COLORS = ['#3b82f6', '#f97316', '#8b5cf6', '#ec4899'];
        const DEF_NAMES = ['Home', 'Away', 'Team 3', 'Team 4'];

        let teams = JSON.parse(localStorage.getItem('nd_teams')) || [
            { name: 'Home', color: '#3b82f6', shape: 'circle', players: [], active: true },
            { name: 'Away', color: '#f97316', shape: 'square', players: [], active: true },
        ];
        let shots = JSON.parse(localStorage.getItem('nd_shots')) || [];
        let lastPlayer = localStorage.getItem('nd_lastPlayer') || '';
        let lastTeamIdx = +(localStorage.getItem('nd_lastTeam') ?? 0);
        let selTeamIdx = Math.min(lastTeamIdx, teams.length - 1);

        // Set of "teamIdx:playerId" strings that are SELECTED for filtering.
        // Empty = show all.
        let playerFilter = new Set();

        let currentTap = null;
        let heatOn = false;
        let heatObj = null;

        // Quarter & Zone state
        let currentQuarter = 1; // 1-4; 0 = "All"
        let zones = JSON.parse(localStorage.getItem('nd_zones')) || null;
        let zonesOn = false;
        let zoneDrawMode = false;
        let zoneDraftPoints = []; // Array of {x, y} for freeform drawing

        // ══════════════════════════════════
        // ELEMENT REFS
        // ══════════════════════════════════
        const courtWrapper = document.getElementById('courtWrapper');
        const markersLayer = document.getElementById('markersLayer');
        const heatCanvas = document.getElementById('heatCanvas');
        const labelLeft = document.getElementById('labelLeft');
        const labelRight = document.getElementById('labelRight');

        const shotModal = document.getElementById('shotModal');
        const shotBg = document.getElementById('shotBg');
        const shotClose = document.getElementById('shotClose');
        const playerNumInput = document.getElementById('playerNumInput');
        const playerChips = document.getElementById('playerChips');
        const modalTeamSel = document.getElementById('modalTeamSel');
        const modalTeamDot = document.getElementById('modalTeamDot');
        const btnMake = document.getElementById('btnMake');
        const btnMiss = document.getElementById('btnMiss');

        const setupModal = document.getElementById('setupModal');
        const setupBg = document.getElementById('setupBg');
        const setupClose = document.getElementById('setupClose');
        const teamSetupList = document.getElementById('teamSetupList');

        const statsPanel = document.getElementById('statsPanel');
        const statsBody = document.getElementById('statsBody');
        const teamTabs = document.getElementById('teamTabs');
        const filterHint = document.getElementById('filterHint');

        // ══════════════════════════════════
        // INIT
        // ══════════════════════════════════
        function init() {
            syncCanvas();
            window.addEventListener('resize', syncCanvas);
            updateCourtLabels();
            initZones();
            renderAll();
            // Show stats toggle on mobile
            if (window.innerWidth <= 640) document.getElementById('btnStatsToggle').style.display = 'block';
        }
        window.addEventListener('resize', () => {
            document.getElementById('btnStatsToggle').style.display = window.innerWidth <= 640 ? 'block' : 'none';
        });

        function syncCanvas() {
            heatCanvas.width = courtWrapper.clientWidth;
            heatCanvas.height = courtWrapper.clientHeight;
        }

        function updateCourtLabels() {
            const c0 = teams[0]?.color || '#3b82f6';
            const c1 = teams[1]?.color || '#f97316';
            labelLeft.textContent  = (teams[0]?.name || 'Home').toUpperCase();
            labelRight.textContent = (teams[1]?.name || 'Away').toUpperCase();
            labelLeft.style.color       = c0;
            labelLeft.style.borderColor = c0;
            labelRight.style.color       = c1;
            labelRight.style.borderColor = c1;
        }

        // Wire up quarter selector
        document.querySelectorAll('.q-chip').forEach(btn => {
            btn.addEventListener('click', () => {
                currentQuarter = +btn.dataset.q;
                document.querySelectorAll('.q-chip').forEach(b => b.classList.remove('sel'));
                btn.classList.add('sel');
                renderAll();
            });
        });

        // Initialize zones
        function initZones() {
            if (zones !== null) return;
            zones = [
                { id: 'z_left_paint', cx: 95, cy: 250, r: 75, label: 'L Paint' },
                { id: 'z_right_paint', cx: 845, cy: 250, r: 75, label: 'R Paint' },
            ];
            saveZones();
        }

        function saveZones() {
            localStorage.setItem('nd_zones', JSON.stringify(zones));
        }

        // Convert client coordinates to SVG viewBox coordinates
        function clientToSvg(clientX, clientY) {
            const svg = document.getElementById('zoneLayer');
            const pt = svg.createSVGPoint();
            pt.x = clientX;
            pt.y = clientY;
            const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());
            return { x: svgPt.x, y: svgPt.y };
        }

        function deleteZone(id) {
            if (confirm('Delete this zone?')) {
                zones = zones.filter(z => z.id !== id);
                saveZones();
                renderZones();
            }
        }

        // ══════════════════════════════════
        // HAMBURGER MENU
        // ══════════════════════════════════
        const btnMenu = document.getElementById('btnMenu');
        const menuDropdown = document.getElementById('menuDropdown');

        btnMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.style.display = menuDropdown.style.display === 'none' ? 'block' : 'none';
        });

        // Close menu when clicking outside
        document.addEventListener('click', () => {
            menuDropdown.style.display = 'none';
        });

        // Add hover effects to menu items
        const menuItems = menuDropdown.querySelectorAll('button');
        menuItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                item.style.background = 'rgba(255,255,255,.05)';
            });
            item.addEventListener('mouseleave', () => {
                item.style.background = 'none';
            });
        });

        // Wire up zone buttons
        const toggleZones = function() {
            zonesOn = !zonesOn;
            zoneDrawMode = false;
            const zoneLayer = document.getElementById('zoneLayer');
            zoneLayer.style.display = zonesOn ? 'block' : 'none';
            zoneLayer.style.pointerEvents = zonesOn ? 'auto' : 'none';
            document.getElementById('btnZoneDrawMenu').style.display = zonesOn ? 'block' : 'none';
            renderZones();
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        const btnZonesOld = document.getElementById('btnZones');
        if (btnZonesOld) btnZonesOld.addEventListener('click', toggleZones);
        document.getElementById('btnZonesMenu').addEventListener('click', toggleZones);

        const toggleZoneDraw = function() {
            zoneDrawMode = !zoneDrawMode;
            const zoneLayer = document.getElementById('zoneLayer');
            zoneLayer.style.cursor = zoneDrawMode ? 'crosshair' : 'default';
            if (zoneDrawMode) {
                alert('Zone Draw Mode:\n\n• Click and drag to draw zone\n• Release to finish\n• Right-click to cancel\n\nClicks on the court will not log shots while drawing.');
            }
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        const btnZoneDrawOld = document.getElementById('btnZoneDraw');
        if (btnZoneDrawOld) btnZoneDrawOld.addEventListener('click', toggleZoneDraw);
        document.getElementById('btnZoneDrawMenu').addEventListener('click', toggleZoneDraw);

        // Zone drawing event handlers (mobile-optimized freeform drag-to-draw)
        const zoneLayer = document.getElementById('zoneLayer');
        let isDrawing = false;
        let lastDrawTime = 0;

        function startDrawing(clientX, clientY) {
            if (!zoneDrawMode || isDrawing) return;
            isDrawing = true;
            zoneDraftPoints = [];
            const pos = clientToSvg(clientX, clientY);
            zoneDraftPoints.push(pos);

            // Create new polyline for drawing
            const p = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            p.id = 'zoneDraftPolygon';
            p.setAttribute('stroke', '#C83803');
            p.setAttribute('fill', 'none');
            p.setAttribute('stroke-width', '4');
            p.setAttribute('stroke-linecap', 'round');
            p.setAttribute('stroke-linejoin', 'round');
            p.setAttribute('opacity', '0.9');
            zoneLayer.appendChild(p);
        }

        function drawPoint(clientX, clientY) {
            if (!isDrawing || !zoneDrawMode) return;
            const now = Date.now();
            if (now - lastDrawTime < 16) return; // Throttle to ~60fps on mobile
            lastDrawTime = now;

            const pos = clientToSvg(clientX, clientY);
            // Only add point if it's far enough from last point (reduce noise)
            if (zoneDraftPoints.length === 0 || Math.hypot(pos.x - zoneDraftPoints[zoneDraftPoints.length - 1].x, pos.y - zoneDraftPoints[zoneDraftPoints.length - 1].y) > 3) {
                zoneDraftPoints.push(pos);

                const draft = document.getElementById('zoneDraftPolygon');
                if (draft) {
                    const pointsStr = zoneDraftPoints.map(pt => `${Math.round(pt.x)},${Math.round(pt.y)}`).join(' ');
                    draft.setAttribute('points', pointsStr);
                }
            }
        }

        function finishDrawing() {
            if (!isDrawing) return;
            isDrawing = false;

            if (zoneDraftPoints.length < 10) {
                const draft = document.getElementById('zoneDraftPolygon');
                if (draft) draft.remove();
                zoneDraftPoints = [];
                return;
            }

            // Convert polyline to closed polygon for zone
            const draft = document.getElementById('zoneDraftPolygon');
            if (draft) draft.remove();

            const label = prompt('Zone label (e.g. "Paint", "Corner 3"):') || 'Zone';
            zones.push({
                id: 'z_' + Date.now(),
                points: zoneDraftPoints.map(p => ({ x: Math.round(p.x), y: Math.round(p.y) })),
                label
            });
            saveZones();
            zoneDraftPoints = [];
            renderZones();
        }

        // Mouse events
        zoneLayer.addEventListener('mousedown', e => {
            if (!zoneDrawMode) return;
            e.preventDefault();
            startDrawing(e.clientX, e.clientY);
        });

        zoneLayer.addEventListener('mousemove', e => {
            if (!isDrawing || !zoneDrawMode) return;
            e.preventDefault();
            drawPoint(e.clientX, e.clientY);
        });

        zoneLayer.addEventListener('mouseup', () => finishDrawing());
        zoneLayer.addEventListener('mouseleave', () => finishDrawing());

        // Touch events (mobile support)
        zoneLayer.addEventListener('touchstart', e => {
            if (!zoneDrawMode) return;
            e.preventDefault();
            const touch = e.touches[0];
            startDrawing(touch.clientX, touch.clientY);
        }, { passive: false });

        zoneLayer.addEventListener('touchmove', e => {
            if (!isDrawing || !zoneDrawMode) return;
            e.preventDefault();
            const touch = e.touches[0];
            drawPoint(touch.clientX, touch.clientY);
        }, { passive: false });

        zoneLayer.addEventListener('touchend', () => finishDrawing());
        zoneLayer.addEventListener('touchcancel', () => finishDrawing());

        // Right-click to cancel zone drawing
        zoneLayer.addEventListener('contextmenu', e => {
            if (!zoneDrawMode && !isDrawing) return;
            e.preventDefault();
            isDrawing = false;
            zoneDraftPoints = [];
            const draft = document.getElementById('zoneDraftPolygon');
            if (draft) draft.remove();
        });

        function hexToRgba(hex, a) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${a})`;
        }

        // Normalize player entry to {num, name} format (backward compat)
        function normPlayer(p) {
            if (typeof p === 'string') return { num: p, name: '' };
            return p;
        }

        // Calculate points for a shot (2pt or 3pt)
        function shotPoints(shot) {
            if (!shot.make) return 0;
            const cx = (shot.x / 100) * 940, cy = (shot.y / 100) * 500;
            const dl = Math.hypot(cx - 54, cy - 250);
            const dr = Math.hypot(cx - 886, cy - 250);
            const is3 = cx < 470 ? (dl > 237.5 || cy < 45 || cy > 455) : (dr > 237.5 || cy < 45 || cy > 455);
            return is3 ? 3 : 2;
        }

        // ══════════════════════════════════
        // RENDER ALL
        // ══════════════════════════════════
        function renderAll() {
            renderShots();
            renderStats();
            renderScore();
            renderZones();
        }

        // ══════════════════════════════════
        // SCORE DISPLAY
        // ══════════════════════════════════
        function renderScore() {
            const visibleShots = shots.filter(shotVisible);
            const pts = teams.map((_, ti) => {
                let p = 0;
                visibleShots.filter(s => s.teamIdx === ti && s.make).forEach(s => {
                    p += shotPoints(s);
                });
                return p;
            });

            const homeEl = document.getElementById('scoreHome');
            const awayEl = document.getElementById('scoreAway');
            if (homeEl) {
                homeEl.textContent = pts[0] ?? 0;
                homeEl.style.color = teams[0]?.color || '#3b82f6';
            }
            if (awayEl) {
                awayEl.textContent = pts[1] ?? 0;
                awayEl.style.color = teams[1]?.color || '#f97316';
            }
        }

        // ══════════════════════════════════
        // ZONE RENDERING
        // ══════════════════════════════════
        function renderZones() {
            const zoneLayer = document.getElementById('zoneLayer');
            // Clear all zone elements (except draft polygon if drawing)
            [...zoneLayer.children].forEach(el => {
                if (el.id !== 'zoneDraftPolygon') el.remove();
            });

            if (!zonesOn || !zones) return;

            const visibleShots = shots.filter(shotVisible);

            zones.forEach(zone => {
                // Helper: Point in polygon (ray casting algorithm)
                const pointInPolygon = (x, y, points) => {
                    let inside = false;
                    for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
                        const xi = points[i].x, yi = points[i].y;
                        const xj = points[j].x, yj = points[j].y;
                        const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                        if (intersect) inside = !inside;
                    }
                    return inside;
                };

                // Compute FG% for shots inside and outside this zone
                const inside = visibleShots.filter(s => {
                    const sx = (s.x / 100) * 940;
                    const sy = (s.y / 100) * 500;
                    return pointInPolygon(sx, sy, zone.points);
                });
                const outside = visibleShots.filter(s => {
                    const sx = (s.x / 100) * 940;
                    const sy = (s.y / 100) * 500;
                    return !pointInPolygon(sx, sy, zone.points);
                });

                const insideMakes = inside.filter(s => s.make).length;
                const insideAtt = inside.length;
                const outsideMakes = outside.filter(s => s.make).length;
                const outsideAtt = outside.length;

                const insidePct = insideAtt > 0 ? Math.round((insideMakes / insideAtt) * 100) : 0;
                const outsidePct = outsideAtt > 0 ? Math.round((outsideMakes / outsideAtt) * 100) : 0;
                const insidePctStr = insideAtt > 0 ? `${insidePct}%` : '--';
                const outsidePctStr = outsideAtt > 0 ? `${outsidePct}%` : '--';

                // Color based on inside FG%
                let insideColor = '#4a6080';
                let fillColor = 'rgba(42,60,90,.12)';
                if (insideAtt > 0) {
                    if (insidePct >= 50) { insideColor = '#22c55e'; fillColor = 'rgba(34,197,94,.12)'; }
                    else if (insidePct >= 30) { insideColor = '#fbbf24'; fillColor = 'rgba(251,191,36,.12)'; }
                    else { insideColor = '#f87171'; fillColor = 'rgba(200,56,3,.12)'; }
                }

                // Zone polygon
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                const pointsStr = zone.points.map(p => `${p.x},${p.y}`).join(' ');
                poly.setAttribute('points', pointsStr);
                poly.setAttribute('class', 'zone-circle');
                poly.setAttribute('stroke', insideColor);
                poly.setAttribute('fill', fillColor);
                poly.style.cursor = 'pointer';
                poly.addEventListener('contextmenu', e => { e.preventDefault(); deleteZone(zone.id); });
                zoneLayer.appendChild(poly);

                // Find centroid for label placement
                let centerX = 0, centerY = 0;
                zone.points.forEach(p => { centerX += p.x; centerY += p.y; });
                centerX /= zone.points.length;
                centerY /= zone.points.length;

                // Zone label
                const labelEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                labelEl.setAttribute('x', centerX);
                labelEl.setAttribute('y', centerY - 20);
                labelEl.setAttribute('class', 'zone-label');
                labelEl.setAttribute('text-anchor', 'middle');
                labelEl.textContent = zone.label;
                zoneLayer.appendChild(labelEl);

                // Inside FG% stats
                const insideEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                insideEl.setAttribute('x', centerX);
                insideEl.setAttribute('y', centerY - 4);
                insideEl.setAttribute('class', 'zone-fg');
                insideEl.setAttribute('fill', insideColor);
                insideEl.setAttribute('text-anchor', 'middle');
                insideEl.setAttribute('font-size', '13');
                insideEl.setAttribute('font-weight', '700');
                insideEl.textContent = `IN: ${insidePctStr}`;
                zoneLayer.appendChild(insideEl);

                // Inside attempts count
                const insideAttEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                insideAttEl.setAttribute('x', centerX);
                insideAttEl.setAttribute('y', centerY + 10);
                insideAttEl.setAttribute('class', 'zone-fg');
                insideAttEl.setAttribute('fill', '#4a6080');
                insideAttEl.setAttribute('text-anchor', 'middle');
                insideAttEl.setAttribute('font-size', '10');
                insideAttEl.textContent = insideAtt > 0 ? `${insideMakes}/${insideAtt}` : '--/0';
                zoneLayer.appendChild(insideAttEl);

                // Outside FG% stats
                const outsideEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                outsideEl.setAttribute('x', centerX);
                outsideEl.setAttribute('y', centerY + 26);
                outsideEl.setAttribute('class', 'zone-fg');
                outsideEl.setAttribute('fill', '#94a3b8');
                outsideEl.setAttribute('text-anchor', 'middle');
                outsideEl.setAttribute('font-size', '11');
                outsideEl.textContent = `OUT: ${outsidePctStr}`;
                zoneLayer.appendChild(outsideEl);

                // Outside attempts count
                const outsideAttEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                outsideAttEl.setAttribute('x', centerX);
                outsideAttEl.setAttribute('y', centerY + 36);
                outsideAttEl.setAttribute('class', 'zone-fg');
                outsideAttEl.setAttribute('fill', '#4a6080');
                outsideAttEl.setAttribute('text-anchor', 'middle');
                outsideAttEl.setAttribute('font-size', '9');
                outsideAttEl.textContent = outsideAtt > 0 ? `${outsideMakes}/${outsideAtt}` : '--/0';
                zoneLayer.appendChild(outsideAttEl);

                // Delete button (small X in corner of zone)
                const bounds = zone.points.reduce((acc, p) => ({
                    minX: Math.min(acc.minX, p.x),
                    maxX: Math.max(acc.maxX, p.x),
                    minY: Math.min(acc.minY, p.y),
                    maxY: Math.max(acc.maxY, p.y)
                }), { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity });

                const deleteX = bounds.maxX - 10;
                const deleteY = bounds.minY + 10;
                const deleteBtnRadius = 8; // Larger for mobile touch targets

                const deleteBtn = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                deleteBtn.setAttribute('cx', deleteX);
                deleteBtn.setAttribute('cy', deleteY);
                deleteBtn.setAttribute('r', deleteBtnRadius);
                deleteBtn.setAttribute('fill', '#f87171');
                deleteBtn.setAttribute('stroke', 'white');
                deleteBtn.setAttribute('stroke-width', '2');
                deleteBtn.style.cursor = 'pointer';
                deleteBtn.style.touchAction = 'manipulation';
                deleteBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    deleteZone(zone.id);
                });
                deleteBtn.addEventListener('mouseenter', () => deleteBtn.setAttribute('r', deleteBtnRadius + 1));
                deleteBtn.addEventListener('mouseleave', () => deleteBtn.setAttribute('r', deleteBtnRadius));
                deleteBtn.addEventListener('touchstart', e => deleteBtn.setAttribute('r', deleteBtnRadius + 1), { passive: true });
                deleteBtn.addEventListener('touchend', e => deleteBtn.setAttribute('r', deleteBtnRadius), { passive: true });
                zoneLayer.appendChild(deleteBtn);

                const deleteText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                deleteText.setAttribute('x', deleteX);
                deleteText.setAttribute('y', deleteY + 2.5);
                deleteText.setAttribute('text-anchor', 'middle');
                deleteText.setAttribute('font-size', '12');
                deleteText.setAttribute('font-weight', 'bold');
                deleteText.setAttribute('fill', 'white');
                deleteText.setAttribute('pointer-events', 'none');
                deleteText.textContent = '×';
                zoneLayer.appendChild(deleteText);
            });
        }

        // ══════════════════════════════════
        // IS SHOT VISIBLE?
        // ══════════════════════════════════
        function shotVisible(shot) {
            const team = teams[shot.teamIdx];
            if (!team || !team.active) return false;
            // Quarter filter: 0 = All (no filter). Old shots with no quarter always pass.
            if (currentQuarter !== 0 && shot.quarter != null && shot.quarter !== currentQuarter) return false;
            if (playerFilter.size === 0) return true;
            return playerFilter.has(`${shot.teamIdx}:${shot.playerId}`);
        }

        // ══════════════════════════════════
        // SHOT MARKERS
        // ══════════════════════════════════
        function renderShots() {
            markersLayer.innerHTML = '';
            const heatPts = [];

            shots.forEach(shot => {
                const team = teams[shot.teamIdx];
                if (!team) return;
                const visible = shotVisible(shot);

                if (!heatOn) {
                    const el = document.createElement('div');
                    const shape = team.shape || 'circle';
                    el.className = `sm sm-${shape} ${shot.make ? 'sm-make' : 'sm-miss'}${visible ? '' : ' dimmed'}`;
                    el.style.left = `${shot.x}%`;
                    el.style.top = `${shot.y}%`;

                    if (shape === 'diamond') {
                        el.innerHTML = `<span class="lbl">${shot.playerId}</span>`;
                    } else if (shape === 'triangle') {
                        // triangle: jersey # in title only (no room inside)
                        el.title = `#${shot.playerId} ${shot.make ? 'MAKE' : 'MISS'}`;
                    } else {
                        el.textContent = shot.playerId;
                        el.title = `#${shot.playerId} ${shot.make ? 'MAKE' : 'MISS'} (${team.name})`;
                    }
                    markersLayer.appendChild(el);
                }

                if (heatOn && visible) {
                    const px = (shot.x / 100) * heatCanvas.width;
                    const py = (shot.y / 100) * heatCanvas.height;
                    heatPts.push([px, py, shot.make ? 3 : 1]);
                }
            });

            if (heatOn) {
                heatCanvas.style.display = 'block';
                renderHeatmap(heatPts);
            } else {
                heatCanvas.style.display = 'none';
                const ctx = heatCanvas.getContext('2d');
                ctx.clearRect(0, 0, heatCanvas.width, heatCanvas.height);
                heatObj = null;
            }
        }

        function renderHeatmap(pts) {
            // Built-in canvas heatmap (no external lib needed – simpler & more reliable)
            const ctx = heatCanvas.getContext('2d');
            ctx.clearRect(0, 0, heatCanvas.width, heatCanvas.height);
            pts.forEach(([x, y, w]) => {
                const r = 36 * (heatCanvas.width / 860);
                const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                const alpha = Math.min(0.55, 0.15 * w);
                grad.addColorStop(0, `rgba(239,68,68,${alpha})`);
                grad.addColorStop(0.4, `rgba(251,191,36,${alpha * .6})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
            });
        }

        // ══════════════════════════════════
        // SPLIT STATS PANELS
        // ══════════════════════════════════
        function renderStats() {
            renderTeamPanel(0, 'spLeftHeader', 'spLeftBody', 'spLeftFooter');
            renderTeamPanel(1, 'spRightHeader', 'spRightBody', 'spRightFooter');
        }

        function renderTeamPanel(ti, headerId, bodyId, footerId) {
            const team = teams[ti];
            if (!team) return;

            const headerEl = document.getElementById(headerId);
            const bodyEl = document.getElementById(bodyId);
            const footerEl = document.getElementById(footerId);
            if (!headerEl || !bodyEl || !footerEl) return;

            // Header: team name + ON/OFF toggle
            const shapeIcon = { circle: '◯', square: '▢', diamond: '◆', triangle: '△' }[team.shape] || '◯';
            headerEl.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;">
                    <span style="color:${team.color};display:flex;align-items:center;gap:4px;"><span style="font-size:11px;">${shapeIcon}</span> <span style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;">${team.name}</span></span>
                    <button onclick="toggleTeamActive(${ti})" style="font-size:8px;padding:2px 6px;border-radius:6px;background:${team.active ? team.color : 'transparent'};border:1px solid ${team.color};color:${team.active ? '#0B162A' : team.color};cursor:pointer;font-weight:900;">
                        ${team.active ? 'ON' : 'OFF'}
                    </button>
                </div>`;

            // Player rows
            bodyEl.innerHTML = '';
            const teamShots = shots.filter(s => s.teamIdx === ti && shotVisible(s));
            const playerNums = [...new Set([
                ...team.players.map(p => normPlayer(p).num),
                ...shots.filter(s => s.teamIdx === ti).map(s => s.playerId)
            ])];

            let totMakes = 0, totAtt = 0, totPts = 0;

            playerNums.forEach(pid => {
                const player = normPlayer(team.players.find(p => normPlayer(p).num === pid) || pid);
                const ps = teamShots.filter(s => s.playerId === pid);
                const allPs = shots.filter(s => s.teamIdx === ti && s.playerId === pid);
                const makes = ps.filter(s => s.make).length;
                const att = ps.length;
                const pct = att > 0 ? Math.round((makes / att) * 100) : null;
                const pts = ps.filter(s => s.make).reduce((a, s) => a + shotPoints(s), 0);
                totMakes += makes; totAtt += att; totPts += pts;

                const key = `${ti}:${pid}`;
                const isFiltered = playerFilter.size > 0 && !playerFilter.has(key);
                const pctColor = pct === null ? '#4a6080' : pct >= 50 ? '#22c55e' : pct >= 30 ? '#fbbf24' : '#f87171';

                const row = document.createElement('div');
                row.className = `player-row${isFiltered ? ' dimmed' : ''}`;
                const shapeStyle = team.shape === 'circle' ? 'border-radius:50%' : team.shape === 'square' ? 'border-radius:4px' : 'border-radius:50%';
                row.innerHTML = `
                    <div style="width:24px;height:24px;${shapeStyle};border:2px solid ${team.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:${team.color};background:rgba(0,0,0,.4);">${pid}</div>
                    <div style="overflow:hidden;">
                        <div style="font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                            ${player.name ? player.name : `#${pid}`}
                        </div>
                        <div style="font-size:8px;color:#3a5070;">${pts}pts</div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:11px;font-weight:900;color:#22c55e;">${makes}</div>
                        <div style="font-size:7px;color:#3a5070;">MK</div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:11px;font-weight:900;color:#C83803;">${att-makes}</div>
                        <div style="font-size:7px;color:#3a5070;">MS</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:11px;font-weight:900;color:${pctColor};">${pct!==null?pct+'%':'--'}</div>
                        <div style="font-size:7px;color:#3a5070;">${att}att</div>
                    </div>`;
                row.onclick = () => {
                    if (playerFilter.has(key)) playerFilter.delete(key);
                    else playerFilter.add(key);
                    renderAll();
                };
                bodyEl.appendChild(row);
            });

            if (playerNums.length === 0) {
                bodyEl.innerHTML = `<div style="font-size:10px;color:#2a3c5a;padding:8px 6px;font-style:italic;">No shots yet</div>`;
            }

            // Footer: FG% and PTS
            const fgPct = totAtt > 0 ? Math.round((totMakes / totAtt) * 100) : 0;
            footerEl.innerHTML = `
                <div>
                    <div class="sp-footer-label">FG%</div>
                    <div class="sp-footer-val">${fgPct}%</div>
                </div>
                <div style="border-left:1px solid #1a2d4a;">
                    <div class="sp-footer-label" style="color:${team.color};">PTS</div>
                    <div class="sp-footer-val" style="color:${team.color};">${totPts}</div>
                </div>`;
        }

        function toggleTeamActive(ti) {
            teams[ti].active = !teams[ti].active;
            saveTeams();
            renderAll();
        }

        // ══════════════════════════════════
        // COURT CLICK (mouse & touch)
        // ══════════════════════════════════
        function handleCourtTap(clientX, clientY) {
            if (zoneDrawMode) return; // Don't log shots while drawing zones
            const r = courtWrapper.getBoundingClientRect();
            currentTap = {
                x: Math.max(.5, Math.min(99.5, ((clientX - r.left) / r.width) * 100)),
                y: Math.max(.5, Math.min(99.5, ((clientY - r.top) / r.height) * 100))
            };
            haptic('tap');
            openShot();
        }

        courtWrapper.addEventListener('click', e => {
            if (e.target.closest('.sm')) return;
            handleCourtTap(e.clientX, e.clientY);
        });

        // Touch support for mobile
        courtWrapper.addEventListener('touchstart', e => {
            if (e.target.closest('.sm')) return;
            if (zoneDrawMode) return;
            const touch = e.touches[0];
            handleCourtTap(touch.clientX, touch.clientY);
        }, { passive: false });

        // ══════════════════════════════════
        // SHOT MODAL
        // ══════════════════════════════════
        function openShot() {
            buildTeamSel();
            buildChips();
            playerNumInput.value = lastPlayer;
            shotModal.classList.add('open');
            setTimeout(() => playerNumInput.focus(), 320);
        }
        function closeShot() {
            shotModal.classList.remove('open');
            setTimeout(() => { currentTap = null; playerNumInput.blur(); }, 280);
        }
        shotBg.addEventListener('click', closeShot);
        shotClose.addEventListener('click', closeShot);

        function buildTeamSel() {
            modalTeamSel.innerHTML = '';
            const team = teams[selTeamIdx] || teams[0];
            modalTeamDot.style.background = team.color;

            teams.forEach((t, i) => {
                const btn = document.createElement('button');
                btn.className = 'chip' + (i === selTeamIdx ? ' sel' : '');
                btn.style.borderColor = t.color;
                btn.style.color = i === selTeamIdx ? '#0B162A' : t.color;
                if (i === selTeamIdx) btn.style.background = t.color;
                btn.textContent = t.name;
                btn.onclick = () => {
                    selTeamIdx = i;
                    lastTeamIdx = i;
                    localStorage.setItem('nd_lastTeam', i);
                    buildTeamSel();
                    buildChips();
                };
                modalTeamSel.appendChild(btn);
            });
        }

        function buildChips() {
            playerChips.innerHTML = '';
            const team = teams[selTeamIdx] || teams[0];
            if (!team.players.length) {
                playerChips.innerHTML = '<span style="font-size:11px;color:#3a5070;font-style:italic;align-self:center;">Type a jersey # below, or add players in Setup</span>';
                return;
            }
            team.players.forEach(p => {
                const player = normPlayer(p);
                const pid = player.num;
                const btn = document.createElement('button');
                btn.className = 'chip' + (pid === lastPlayer ? ' sel' : '');
                btn.style.borderColor = team.color;
                btn.style.color = pid === lastPlayer ? '#0B162A' : team.color;
                if (pid === lastPlayer) btn.style.background = team.color;
                const label = player.name ? `#${pid} ${player.name}` : `#${pid}`;
                btn.textContent = label;
                btn.onclick = () => {
                    lastPlayer = pid;
                    playerNumInput.value = pid;
                    buildChips();
                };
                playerChips.appendChild(btn);
            });
        }

        function recordShot(make) {
            if (!currentTap) return;
            let pid = String(playerNumInput.value).trim();
            if (!pid) pid = '?';
            pid = pid.substring(0, 3);

            lastPlayer = pid;
            localStorage.setItem('nd_lastPlayer', pid);

            const team = teams[selTeamIdx] || teams[0];
            if (pid !== '?' && !team.players.some(p => normPlayer(p).num === pid)) {
                team.players.push({ num: pid, name: '' });
                saveTeams();
            }

            shots.push({ id: Date.now(), playerId: pid, teamIdx: selTeamIdx, make, x: currentTap.x, y: currentTap.y, quarter: currentQuarter === 0 ? null : currentQuarter, ts: new Date().toISOString() });
            saveShots();
            haptic(make ? 'make' : 'miss');
            closeShot();
            renderAll();
        }

        btnMake.addEventListener('click', () => recordShot(true));
        btnMiss.addEventListener('click', () => recordShot(false));
        playerNumInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); recordShot(true); } });

        // ══════════════════════════════════
        // SETUP MODAL
        // ══════════════════════════════════
        const openSetupModal = () => {
            buildSetupUI();
            setupModal.classList.add('open');
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        // Support both old button ID and new menu button ID
        const btnSetupOld = document.getElementById('btnSetup');
        if (btnSetupOld) btnSetupOld.onclick = openSetupModal;
        document.getElementById('btnSetupMenu').onclick = openSetupModal;
        function closeSetup() { setupModal.classList.remove('open'); }
        setupBg.addEventListener('click', closeSetup);
        setupClose.addEventListener('click', closeSetup);

        function buildSetupUI() {
            teamSetupList.innerHTML = '';
            teams.forEach((team, i) => {
                const sec = document.createElement('div');
                sec.style.cssText = 'background:#0a1628;border:1px solid #1e3254;border-radius:14px;padding:14px;';
                sec.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <input type="color" id="tc_${i}" value="${team.color}"
          style="width:34px;height:34px;border:none;border-radius:8px;cursor:pointer;padding:2px;background:#111c30;flex-shrink:0;"
          title="Pick team color">
        <input type="text" id="tn_${i}" value="${team.name}" placeholder="${DEF_NAMES[i]}" class="nd-input" style="flex:1;">
        <span style="font-size:11px;font-weight:700;color:${team.color};padding:3px 10px;border-radius:99px;border:1px solid ${team.color};flex-shrink:0;">${team.shape}</span>
      </div>
      <label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4a6080;display:block;margin-bottom:8px;">Players (Jersey # + Name)</label>
      <div id="playerEntries_${i}" style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px;"></div>
      <button type="button" id="btnAddPlayer_${i}" class="nd-btn" style="background:#1a2d4a;color:#94a3b8;padding:6px 12px;font-size:12px;">+ Add Player</button>
    `;

                // Build player entry rows
                const entriesContainer = sec.querySelector(`#playerEntries_${i}`);
                team.players.forEach((p, pi) => {
                    const player = normPlayer(p);
                    const row = document.createElement('div');
                    row.className = 'player-entry-row';
                    row.style.cssText = 'display:grid;grid-template-columns:80px 1fr 28px;gap:6px;';
                    row.innerHTML = `
        <input type="text" class="pe-num nd-input" placeholder="#" value="${player.num}" style="font-weight:900;text-align:center;">
        <input type="text" class="pe-name nd-input" placeholder="Name (optional)" value="${player.name || ''}">
        <button type="button" class="nd-btn" style="background:#1a2d4a;color:#f87171;padding:4px 8px;font-size:12px;">✕</button>
      `;
                    row.querySelector('button').onclick = () => row.remove();
                    entriesContainer.appendChild(row);
                });

                // Add player button
                sec.querySelector(`#btnAddPlayer_${i}`).onclick = () => {
                    const row = document.createElement('div');
                    row.className = 'player-entry-row';
                    row.style.cssText = 'display:grid;grid-template-columns:80px 1fr 28px;gap:6px;';
                    row.innerHTML = `
        <input type="text" class="pe-num nd-input" placeholder="#" style="font-weight:900;text-align:center;">
        <input type="text" class="pe-name nd-input" placeholder="Name (optional)">
        <button type="button" class="nd-btn" style="background:#1a2d4a;color:#f87171;padding:4px 8px;font-size:12px;">✕</button>
      `;
                    row.querySelector('button').onclick = () => row.remove();
                    entriesContainer.appendChild(row);
                };

                // Live color preview on color input
                sec.querySelector(`#tc_${i}`).addEventListener('input', e => {
                    const colorVal = e.target.value;
                    const badge = sec.querySelector('span');
                    badge.style.color = colorVal;
                    badge.style.borderColor = colorVal;
                });
                teamSetupList.appendChild(sec);
            });
        }

        document.getElementById('btnSaveSetup').onclick = () => {
            teams.forEach((team, i) => {
                team.color = document.getElementById(`tc_${i}`).value;
                team.name = document.getElementById(`tn_${i}`).value.trim() || DEF_NAMES[i];

                // Read player entries from the dynamic form
                const sec = teamSetupList.children[i];
                if (sec) {
                    const entries = [...sec.querySelectorAll('.player-entry-row')];
                    team.players = entries
                        .map(row => {
                            const num = row.querySelector('.pe-num').value.trim();
                            const name = row.querySelector('.pe-name').value.trim();
                            return num ? { num, name } : null;
                        })
                        .filter(Boolean);
                }
            });
            saveTeams();
            closeSetup();
            updateCourtLabels();
            renderAll();
        };

        // ══════════════════════════════════
        // HEATMAP TOGGLE
        // ══════════════════════════════════
        const toggleHeatmap = function () {
            heatOn = !heatOn;
            renderShots();
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        const btnHeatmapOld = document.getElementById('btnHeatmap');
        if (btnHeatmapOld) btnHeatmapOld.onclick = toggleHeatmap;
        document.getElementById('btnHeatmapMenu').onclick = toggleHeatmap;

        // ══════════════════════════════════
        // SHOW ALL / CLEAR
        // ══════════════════════════════════
        const doShowAll = () => {
            playerFilter.clear();
            renderAll();
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        const btnShowAllOld = document.getElementById('btnShowAll');
        if (btnShowAllOld) btnShowAllOld.onclick = doShowAll;
        document.getElementById('btnShowAllMenu').onclick = doShowAll;

        const doClear = () => {
            if (confirm('Clear all shot data?')) {
                shots = [];
                saveShots();
                playerFilter.clear();
                renderAll();
                haptic('miss');
            }
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        const btnClearOld = document.getElementById('btnClear');
        if (btnClearOld) btnClearOld.onclick = doClear;
        document.getElementById('btnClearMenu').onclick = doClear;

        // ══════════════════════════════════
        // UNDO LAST SHOT
        // ══════════════════════════════════
        const doUndo = () => {
            if (shots.length === 0) return;
            shots.pop();
            saveShots();
            renderAll();
            haptic('tap');
            document.getElementById('menuDropdown').style.display = 'none'; // Close menu
        };
        const btnUndoOld = document.getElementById('btnUndo');
        if (btnUndoOld) btnUndoOld.onclick = doUndo;
        const btnUndoMenu = document.getElementById('btnUndoMenu');
        if (btnUndoMenu) btnUndoMenu.onclick = doUndo;

        // ══════════════════════════════════
        // MOBILE STATS TOGGLE
        // ══════════════════════════════════
        document.getElementById('btnStatsToggle').onclick = () => {
            document.getElementById('statsLeft').classList.toggle('open');
            document.getElementById('statsRight').classList.toggle('open');
        };

        // ══════════════════════════════════
        // PERSISTENCE
        // ══════════════════════════════════
        function saveShots() { localStorage.setItem('nd_shots', JSON.stringify(shots)); }
        function saveTeams() { localStorage.setItem('nd_teams', JSON.stringify(teams)); }

        // ══════════════════════════════════
        // HAPTIC
        // ══════════════════════════════════
        function haptic(t) {
            if (!navigator.vibrate) return;
            if (t === 'make') navigator.vibrate([15, 30, 15]);
            else if (t === 'miss') navigator.vibrate(50);
            else navigator.vibrate(10);
        }

        // ══════════════════════════════════
        // GO
        // ══════════════════════════════════
        init();
    </script>
</body>

</html>
